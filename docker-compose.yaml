---
services:
  terraform:
    image: hashicorp/terraform:1.15.6@sha256:adae45661e45d3c88beef071ee1277b4621cea73517aae7f0844657c8e85f641
    container_name: terraform
    user: "1000:1000"
    environment:
      - TF_TOKEN_app_terraform_io=${TF_TOKEN_app_terraform_io}
    volumes:
      - ./:/terraform
    working_dir: /terraform
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
